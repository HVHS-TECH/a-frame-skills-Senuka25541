<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://rawgit.com/donmccurdy/aframe-extras/v2.1.1/dist/aframe-extras.loaders.min.js"></script> 
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>

  </head>
    <body>
    <a-scene>
      <a-sky color="lightblue"></a-sky>
      
      <a-entity 
      ply-model="src:dog.ply"
      position="1.3 -1.6 -5"
      rotation="270 90 0"
      animation="
                    property:position;
                    from: 1.3 -1.3 -5;
                    to: 1.3 -1 -5;
                    dur: 500;
                    loop: true;
                    dir:alternate
                    "

      ></a-entity>

      <a-entity 
      ply-model="src:House.ply"
      position="-3 -4 -11"
      rotation="270 270 0 "

      ></a-entity>

      <a-plane position="-3 -0.3 -11" color="green" radius="0.1" rotation="-90 -90 -90" scale="100 100 100"></a-plane>
                 
    </a-scene>
  </body>
</html>
