<!DOCTYPE html>
<html>
<head>
  <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
</head>

<body>
<a-scene>

  <a-sky color="black"></a-sky>

  <a-sphere position="0 2 -4" color="yellow" radius="0.7"></a-sphere>

  
  <a-entity position="0 2 -4"

            animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">

    <a-sphere position="3 0 0" color="blue" radius="0.3">

  <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">

        <a-sphere position="0.6 0 0" color="grey" radius="0.1"></a-sphere>

      </a-entity>

    </a-sphere>

  </a-entity>

</a-scene>
</body>
</html>
