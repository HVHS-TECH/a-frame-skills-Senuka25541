<!DOCTYPE html>
<html>
<head>
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <title>Orbit Example</title>
</head>
<body>
<a-scene>

    <a-sky color="black"></a-sky>

    <a-sphere position="0 2 -4" color="yellow" radius="0.7"></a-sphere>

    <a-entity position="0 2 -4"
        animation="property: rotation;
                   to: 0 360 0;
                   loop: true;
                   dur: 5000;
                   easing: linear">

        <a-sphere position="2 0 0"
                  color="blue"
                  radius="0.3">

                      <a-entity position="0 2 -4"
        animation="property: rotation;
                   to: 0 0 0;
                   loop: true;
                   dur: 5000;
                   easing: linear">
                  <a-sphere position="4 0 0" radius=" 0.1" colour=" grey"></a-sphere></a-entity>
        </a-sphere>

    </a-entity>

</a-scene>
</body>
</html>
